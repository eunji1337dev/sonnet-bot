version: '3.8'

services:
  sonnet-bot:
    build: .
    container_name: sonnet-bot
    restart: always
    environment:
      - DATABASE_PATH=/app/data/sonnet.db
      - OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED=true
    volumes:
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    secrets:
      - bot_token
      - groq_api_key
      - gemini_api_key

secrets:
  bot_token:
    file: ./secrets/bot_token.txt
  groq_api_key:
    file: ./secrets/groq_api_key.txt
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
